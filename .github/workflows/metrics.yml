name: Metrics

# Renders the five dashboard SVGs the README actually displays, then lands
# them as ONE GitHub-signed (Verified) commit via the GraphQL
# createCommitOnBranch API — no committer key management, no per-card commit
# spam, and `git log --format='%(trailers)' -- '*.svg'` is a queryable
# ledger of everything the automation did.
#
# History: this used to be 8 independent jobs that each committed its own
# SVG (up to 8 racing bot commits per run). See docs/ops/README.md.

on:
  schedule:
    - cron: "0 0 * * *" # daily 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Render header
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          filename: header.svg
          token: ${{ secrets.METRICS_SECRET }}
          user: codyaverett
          template: classic
          base: header
          config_timezone: America/Chicago
          output_action: none

      - name: Render issues / PRs / languages
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          filename: issue_pr_lang.svg
          token: ${{ secrets.METRICS_SECRET }}
          user: codyaverett
          template: classic
          base: ""
          config_timezone: America/Chicago
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: yes
          plugin_followup: yes
          # The `repositories` followup section rendered all zeros for months
          # (counts issues ON owned repos, which see no traffic) — user-wide
          # search is the section with signal.
          plugin_followup_sections: user
          plugin_languages: yes
          output_action: none

      - name: Render activity / community
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          filename: acti_comm.svg
          token: ${{ secrets.METRICS_SECRET }}
          user: codyaverett
          template: classic
          base: activity, community
          config_timezone: America/Chicago
          output_action: none

      - name: Render isometric calendar
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          filename: iso_calendar.svg
          token: ${{ secrets.METRICS_SECRET }}
          user: codyaverett
          template: classic
          base: ""
          config_timezone: America/Chicago
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          output_action: none

      - name: Render achievements
        # Fork with Projects V2 fix (https://github.com/lowlighter/metrics/issues/1706)
        uses: stalomeow/metrics@4fca5f91c5432c68955ea66a8fa7c6a51f58644e # projects-v2
        with:
          filename: achievements.svg
          token: ${{ secrets.METRICS_SECRET }}
          user: codyaverett
          base: achievements
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
          output_action: none

      - name: Collect renders
        run: sudo cp /metrics_renders/*.svg .

      - name: Commit renders (verified, with trailers)
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          bash scripts/verified-commit.sh
          "chore(metrics): refresh profile dashboards" '*.svg'
