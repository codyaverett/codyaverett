name: featured-decay

# Weekly decay pass over the Featured Projects slots. A project with no
# author commits on its default branch in the last 90 days is culled from
# the README, in public, with a tombstone. See featured.toml for the rules.

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: featured-decay
  cancel-in-progress: false

jobs:
  decay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run decay pass
        id: decay
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          summary="$(python3 scripts/featured.py --write)"
          echo "summary=${summary}" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        env:
          SUMMARY: ${{ steps.decay.outputs.summary }}
        run: |
          if git diff --quiet README.md scripts/featured-state.json; then
            echo "no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/featured-state.json
          git commit -m "chore(featured): ${SUMMARY}"
          git push
